<div class="relative min-h-screen w-full flex items-center justify-center p-6 bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
  <div class="absolute inset-0 z-0">
    <img
      alt="Cinematic theater interior"
      class="w-full h-full object-cover scale-105 blur-sm brightness-[0.3]"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuDG4fGbhldkDBrUbyu2g9c4kun6oQ1IDmWe0CUW86OkJORINYJt7-d9j28hqA8OxuK-EmZZ3Pa7Z-Q7H6eA1H5RjgpHAMWtPSoO17_tuyq1URrceZSB6MkcjaXCrofusgTdQ7pkF18yDt4deX1G7CS2z3jZWC-WxjIVOUtUagArVnlZ2gpricdRPJb8_IZ6lgD9Mv3ncpXbeEy2_mop-jxTMNM6D1xNYM9uUA6MeHHUhPNHBG5ft3_OsEIHL1ZvoPZ8INvmhPTC8Nc"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-background-dark/60 to-background-dark"></div>
  </div>

  <div class="relative z-10 w-full max-w-[440px]">
    <div class="glass-card rounded-3xl p-8 md:p-10 shadow-2xl">
      <div class="flex flex-col items-center mb-8">
        <div class="flex items-center gap-2 text-primary mb-6">
          <span class="material-symbols-outlined text-4xl font-bold">confirmation_number</span>
          <h1 class="text-3xl font-black tracking-tighter uppercase">CINEMAX</h1>
        </div>

        <h2 class="text-2xl font-bold text-white mb-3">New Password</h2>
        <p class="text-slate-400 text-sm font-medium text-center leading-relaxed">
          Create a new password for your account.
        </p>
      </div>

      <form class="space-y-5" (ngSubmit)="onSubmit()" #f="ngForm">
        <p *ngIf="okMsg" class="text-green-400 text-sm font-bold text-center">{{ okMsg }}</p>
        <p *ngIf="errorMsg" class="text-red-400 text-sm font-bold text-center">{{ errorMsg }}</p>

        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">New Password</label>
          <input
            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 px-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600"
            type="password"
            name="newPassword"
            [(ngModel)]="newPassword"
            required
            minlength="8"
            placeholder="••••••••"
          />
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Confirm Password</label>
          <input
            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 px-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600"
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            minlength="8"
            placeholder="••••••••"
          />
        </div>

        <button
          class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest transition-all shadow-lg shadow-primary/30 active:scale-[0.98] disabled:opacity-60"
          type="submit"
          [disabled]="loading || !f.valid || !token"
        >
          {{ loading ? 'Updating...' : 'Update Password' }}
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/5 text-center">
        <a class="text-slate-400 hover:text-white font-bold text-sm" routerLink="/auth/login">
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
