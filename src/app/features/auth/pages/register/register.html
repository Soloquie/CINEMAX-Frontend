<div class="relative min-h-screen w-full flex items-center justify-center p-6">
<div class="fixed inset-0 z-0">
<img alt="Cinematic theater interior" class="w-full h-full object-cover scale-105 blur-sm brightness-[0.3]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDG4fGbhldkDBrUbyu2g9c4kun6oQ1IDmWe0CUW86OkJORINYJt7-d9j28hqA8OxuK-EmZZ3Pa7Z-Q7H6eA1H5RjgpHAMWtPSoO17_tuyq1URrceZSB6MkcjaXCrofusgTdQ7pkF18yDt4deX1G7CS2z3jZWC-WxjIVOUtUagArVnlZ2gpricdRPJb8_IZ6lgD9Mv3ncpXbeEy2_mop-jxTMNM6D1xNYM9uUA6MeHHUhPNHBG5ft3_OsEIHL1ZvoPZ8INvmhPTC8Nc"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-background-dark/60 to-background-dark"></div>
</div>
<div class="relative z-10 w-full max-w-[560px] my-12">
<div class="glass-card rounded-3xl p-8 md:p-12 shadow-2xl">
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 text-primary mb-2">
<span class="material-symbols-outlined text-4xl font-bold">confirmation_number</span>
<h1 class="text-3xl font-black tracking-tighter uppercase">CINEMAX</h1>
</div>
<h2 class="text-xl font-bold text-white uppercase tracking-wider">Create your account</h2>
<p class="text-slate-400 text-xs font-medium mt-1 tracking-wide uppercase">Join the premier cinema experience</p>
</div>
<form class="space-y-5" (ngSubmit)="onSubmit()" #f="ngForm"><div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-1">First Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">person</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600 text-sm" name="nombre" [(ngModel)]="model.nombre" required />
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-1">Last Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">person_add</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600 text-sm" name="apellido" [(ngModel)]="model.apellido" required />
</div>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-1">Date of Birth</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">calendar_today</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600 text-sm" name="fechaNacimiento" [(ngModel)]="model.fechaNacimiento" required type="date" />
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">mail</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600 text-sm" name="email" [(ngModel)]="model.email" required type="email" />
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">call</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600 text-sm" name="telefono" [(ngModel)]="model.telefono" required type="tel" />
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">lock</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-12 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600 text-sm" name="password" [(ngModel)]="model.password" required type="password" />
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest transition-all shadow-lg shadow-primary/30 active:scale-[0.98]" type="submit">
                            Sign Up
                        </button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-white/5 text-center">
<p class="text-slate-400 text-sm">
                        Already have an account? 
<a class="text-primary font-bold hover:underline ml-1 inline-block" routerLink="/auth/login">
  Sign In
</a></p>
</div>
</div>
<div class="flex items-center justify-center gap-2 mt-8 text-slate-500">
<span class="material-symbols-outlined text-sm">shield_lock</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em]">Secure Registration System</span>
</div>
</div>
</div>
