<div class="relative min-h-screen w-full flex items-center justify-center p-6 bg-background-dark font-display text-slate-100 antialiased overflow-x-hidden">
  <div class="fixed inset-0 z-0">
    <img
      alt="Cinematic theater interior"
      class="w-full h-full object-cover scale-105 blur-sm brightness-[0.3]"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuDG4fGbhldkDBrUbyu2g9c4kun6oQ1IDmWe0CUW86OkJORINYJt7-d9j28hqA8OxuK-EmZZ3Pa7Z-Q7H6eA1H5RjgpHAMWtPSoO17_tuyq1URrceZSB6MkcjaXCrofusgTdQ7pkF18yDt4deX1G7CS2z3jZWC-WxjIVOUtUagArVnlZ2gpricdRPJb8_IZ6lgD9Mv3ncpXbeEy2_mop-jxTMNM6D1xNYM9uUA6MeHHUhPNHBG5ft3_OsEIHL1ZvoPZ8INvmhPTC8Nc"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-background-dark/60 to-background-dark"></div>
  </div>

  <div class="relative z-10 w-full max-w-[520px]">
    <div class="glass-card rounded-3xl p-8 md:p-12 shadow-2xl">
      <div class="flex flex-col items-center text-center mb-8">
        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6 relative">
          <span class="material-symbols-outlined text-5xl text-primary">mark_email_read</span>
        </div>

        <div class="flex items-center gap-2 text-primary mb-6">
          <span class="material-symbols-outlined text-4xl font-bold">confirmation_number</span>
          <h1 class="text-3xl font-black tracking-tighter uppercase">CINEMAX</h1>
        </div>

        <h2 class="text-2xl font-bold text-white uppercase tracking-wider mb-4">
          {{ title }}
        </h2>

        <p class="text-slate-300 text-lg leading-relaxed">
          {{ description }}
        </p>

        <p *ngIf="serverMessage" class="mt-4 text-sm font-bold" [ngClass]="ok ? 'text-green-400' : 'text-red-400'">
          {{ serverMessage }}
        </p>
      </div>

      <div class="pt-4 space-y-3">
        <!-- Si hay token -> permite verificar -->
        <button
          *ngIf="token"
          (click)="onVerify()"
          [disabled]="loading"
          class="w-full bg-primary hover:bg-primary/90 text-white py-5 rounded-xl font-black text-base uppercase tracking-widest transition-all shadow-lg shadow-primary/30 active:scale-[0.98] disabled:opacity-60"
        >
          {{ loading ? 'Verifying...' : 'Verify Account' }}
        </button>

        <!-- Si no hay token -> reenviar -->
        <div *ngIf="!token" class="space-y-3">
          <input
            class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 px-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-slate-100 placeholder:text-slate-600"
            placeholder="name@example.com"
            type="email"
            [(ngModel)]="email"
            name="email"
          />

          <button
            (click)="onResend()"
            [disabled]="loading || !email"
            class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest transition-all shadow-lg shadow-primary/30 active:scale-[0.98] disabled:opacity-60"
          >
            {{ loading ? 'Sending...' : 'Resend Verification Email' }}
          </button>
        </div>

        <a routerLink="/auth/login" class="block text-center text-slate-400 hover:text-white font-bold text-sm mt-2">
          Back to Login
        </a>
      </div>
    </div>

    <div class="flex items-center justify-center gap-2 mt-8 text-slate-500">
      <span class="material-symbols-outlined text-sm text-primary/50">verified_user</span>
      <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Secure Verification Protocol</span>
    </div>
  </div>
</div>
